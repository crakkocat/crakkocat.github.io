
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>400 – Bad Request | CrakkoCat</title>
<style>
body {
    margin: 0;
    background: black;
    color: #ff4444;
    font-family: monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
}

.container {
    animation: glitch 1s infinite alternate;
}

h1 {
    font-size: 100px;
    margin: 0;
}

p {
    font-size: 18px;
}

.info {
    color: #aaaaaa;
    font-size: 14px;
    margin-top: 10px;
}

button {
    background: transparent;
    border: 1px solid #ff4444;
    color: white;
    padding: 10px 20px;
    margin-top: 15px;
    cursor: pointer;
    font-family: monospace;
}

button:hover {
    background: #ff4444;
    color: black;
}

#reportStatus {
    margin-top: 15px;
    color: #00ff88;
}

a {
    display:inline-block;
    margin-top:10px;
    color:white;
    text-decoration:none;
}
</style>
</head>
<body>
<div class="container">
    <h1>400</h1>
    <p>CrakkoCat rejected your request.</p>
    <p>Did you try to break the internet?</p>

    <div class="info">
        Your IP: 201.57.165.168<br>
        Security Level: Maximum Paranoia
    </div>

    <button onclick="fakeReport()">Report this to Cloudflare</button>
    <br>
    <a href="/">Return to safety</a>

    <div id="reportStatus"></div>
</div>

<script>
function generateRayID() {
    const chars = "abcdef0123456789";
    let id = "";
    for (let i = 0; i < 16; i++) {
        id += chars[Math.floor(Math.random() * chars.length)];
    }
    return id;
}

function fakeReport() {
    const status = document.getElementById("reportStatus");
    const rayID = generateRayID();

    status.innerHTML = "Connecting to Cloudflare...";
    
    setTimeout(() => {
        status.innerHTML = "Transmitting packet logs...";
    }, 1000);

    setTimeout(() => {
        status.innerHTML = 
            "Report sent successfully.<br>" +
            "Ray ID: " + rayID + "<br>" +
            "Cloudflare will look into this issue.";
    }, 2000);
}
</script>
</body>
</html>
