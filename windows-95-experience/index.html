<!DOCTYPE html>
<html>
<head>
<title>CrakkoCat Windows 95 Experience</title>
<style>
body {
    margin: 0;
    background: black;
    color: lime;
    font-family: monospace;
    text-align: center;
}

h1 {
    margin-top: 20px;
}

#screen_container {
    margin: 20px auto;
    width: 800px;
    height: 600px;
    border: 4px solid lime;
}
</style>
</head>
<body>

<h1>CrakkoCat Windows 95 Experience</h1>
<p>Booting Cat Recovery OS...</p>

<div id="screen_container"></div>

<script src="v86/libv86.js"></script>
<script>
var emulator = new V86Starter({
    wasm_path: "v86/v86.wasm",
    memory_size: 128 * 1024 * 1024,
    vga_memory_size: 8 * 1024 * 1024,
    screen_container: document.getElementById("screen_container"),
    hda: {
        url: "v86/images/win95.img"
    },
    autostart: true
});
</script>

</body>
</html>
