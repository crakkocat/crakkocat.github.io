<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CrakkoCat – Cat of the Day</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fdf6e3;
    color: #333;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    text-align: center;
    padding: 20px;
}

h1 {
    font-size: 48px;
    margin-bottom: 10px;
    color: #ff6600;
}

h2 {
    font-size: 24px;
    margin-bottom: 30px;
    color: #555;
}

.cat-image {
    width: 300px;
    height: 300px;
    border-radius: 16px;
    object-fit: cover;
    margin-bottom: 20px;
    border: 4px solid #ff9900;
}

.footer {
    margin-top: 40px;
    font-size: 14px;
    color: #777;
}
</style>
</head>
<body>

<h1>CrakkoCat – Cat of the Day</h1>
<h2>Meet today’s featured feline!</h2>

<img id="catImage" class="cat-image">
<p id="catFact"></p>

<div class="footer">
    www.crakkocat.com
</div>

<script>
const cats = [
    {
        img: "https://www.crakkocat.com/cat1.png",
        fact: "This little kitty barely meows, an when it does, you can't even hear it."
    {
        img: "https://www.crakkocat.com/cat2.png",
        fact: "This kitty loves water."
    },
    {
        img: "https://www.crakkocat.com/cat3.png",
        fact: "This kitty is a water hoarder."
    },
    {
        img: "https://www.crakkocat.com/cat4.png",
        fact: "It can stare at you for hours without blinking. Fearless."
    },
    {
        img: "https://www.crakkocat.com/cat5.png"
        fact: "Professional zoomies champion, 2026."
    }
];

// Generate a number based on today's date
const today = new Date();
const dayNumber = Math.floor(today.getTime() / (1000 * 60 * 60 * 24));

// Pick cat based on day number
const index = dayNumber % cats.length;

// Display it
document.getElementById("catImage").src = cats[index].img;
document.getElementById("catFact").textContent = cats[index].fact;
</script>

</body>
</html>
