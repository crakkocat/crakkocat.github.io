<!DOCTYPE html>
<html>
<head>
<title>CrakkoCat Switch Image Share</title>

<style>
body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
}

.box{
background:white;
padding:30px;
margin:40px auto;
width:400px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
}
</style>
</head>

<body>

<div class="box">

<h2>Nintendo Switch Image Share</h2>
<p>Upload your screenshot</p>

<input type="file" id="image">

<br><br>

<button onclick="share('bluesky')">Bluesky</button>
<button onclick="share('tumblr')">Tumblr</button>
<button onclick="share('facebook')">Facebook</button>
<button onclick="share('youtube')">YouTube Post</button>

</div>

<script>
function share(platform){

const file = document.getElementById("image").files[0]

if(!file){
alert("Select an image first")
return
}

const formData = new FormData()
formData.append("image", file)
formData.append("platform", platform)

fetch("/upload",{
method:"POST",
body:formData
})

.then(r=>r.text())
.then(alert)

}
</script>

</body>
</html>
